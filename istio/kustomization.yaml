apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # istio-system-namespace.yaml applied separately (namespace override would rename it)
  - istio-base-application.yaml
  - istiod-application.yaml
  - istio-cni-application.yaml
  - ztunnel-application.yaml
  - kiali-application.yaml

commonLabels:
  app.kubernetes.io/name: istio
  app.kubernetes.io/component: service-mesh

namespace: argocd
