# ExternalSecret for Slack credentials
# Syncs from Vault secret/slack → K8s Secret slack-credentials in kagent namespace
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: slack-credentials
    creationPolicy: Owner
  data:
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: slack
        property: SLACK_BOT_TOKEN
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: slack
        property: SLACK_APP_TOKEN
    - secretKey: SLACK_CHANNEL_IDS
      remoteRef:
        key: slack
        property: SLACK_CHANNEL_IDS
    - secretKey: SLACK_TEAM_ID
      remoteRef:
        key: slack
        property: SLACK_TEAM_ID
