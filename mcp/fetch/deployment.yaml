apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetch-mcp-server
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fetch-mcp-server
  template:
    metadata:
      labels:
        app: fetch-mcp-server
    spec:
      containers:
      - name: fetch
        image: fetch-mcp:latest  # docker build -t fetch-mcp:latest -f Dockerfile . ; docker push your-registry/fetch-mcp:latest
        ports:
        - containerPort: 3010
        env:
        - name: MCP_SERVER_TRANSPORT
          value: &quot;streamable_http&quot;