apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fetch-mcp-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: mcp-gateway-proxy
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /fetch
    backendRefs:
    - name: fetch-mcp-server
      port: 3010