---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - curl
      - wget
      - vim
      - htop
      - ufw
      - openssh-server
      - ca-certificates
      - gnupg
    state: present

- name: Configure SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin {{ ssh_permit_root_login }}" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication {{ ssh_password_auth }}" }
  notify: Restart SSH

- name: Enable and configure UFW
  when: firewall_enabled | default(true)
  block:
    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

- name: Set timezone
  community.general.timezone:
    name: UTC
