---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Allow HTTP through firewall
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: firewall_enabled | default(true)

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Deploy Compliance Portal Nginx config
  ansible.builtin.template:
    src: compliance-portal.conf.j2
    dest: /etc/nginx/sites-available/compliance-portal.conf
    mode: "0644"
  notify: Reload Nginx

- name: Enable Compliance Portal site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/compliance-portal.conf
    dest: /etc/nginx/sites-enabled/compliance-portal.conf
    state: link
  notify: Reload Nginx

- name: Ensure Nginx is running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
