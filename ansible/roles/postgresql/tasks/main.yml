---
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - "postgresql"
      - "postgresql-client"
      - python3-psycopg2
    state: present

- name: Allow PostgreSQL through firewall
  community.general.ufw:
    rule: allow
    port: "{{ postgresql_port | string }}"
    proto: tcp
    from_ip: 172.16.10.0/24
  when: firewall_enabled | default(true)

- name: Configure PostgreSQL listen addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: Restart PostgreSQL

- name: Configure max connections
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?max_connections"
    line: "max_connections = {{ postgresql_max_connections }}"
  notify: Restart PostgreSQL

- name: Add pg_hba entries for app server
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    line: "{{ item.type }}    {{ item.database }}    {{ item.user }}    {{ item.address }}    {{ item.method }}"
    insertbefore: "^# IPv4 local connections"
  loop: "{{ postgresql_hba_entries }}"
  notify: Restart PostgreSQL

- name: Ensure PostgreSQL is running
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Create databases
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    encoding: "{{ item.encoding | default('UTF-8') }}"
    template: template0
    state: present
  loop: "{{ postgresql_databases }}"

- name: Create database users
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ item.role_attr_flags | default('') }}"
    db: compliance
    state: present
  loop: "{{ postgresql_users }}"

- name: Grant privileges
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: compliance
    roles: compliance_app
    type: schema
    objs: public
    privs: ALL
    state: present

- name: Create compliance schema tables
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: compliance
    query: |
      CREATE TABLE IF NOT EXISTS audit_reports (
        id SERIAL PRIMARY KEY,
        report_type VARCHAR(50) NOT NULL,
        status VARCHAR(20) DEFAULT 'pending',
        generated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        data JSONB
      );
      CREATE TABLE IF NOT EXISTS compliance_checks (
        id SERIAL PRIMARY KEY,
        check_name VARCHAR(100) NOT NULL,
        category VARCHAR(50),
        result VARCHAR(20),
        details TEXT,
        checked_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
      INSERT INTO audit_reports (report_type, status, data) VALUES
        ('MiFID II', 'completed', '{"transactions": 12481, "flagged": 3}'),
        ('GDPR', 'completed', '{"records_scanned": 84201, "violations": 0}'),
        ('PCI-DSS', 'in_progress', '{"scope": "payment-service", "progress": 67}')
      ON CONFLICT DO NOTHING;
