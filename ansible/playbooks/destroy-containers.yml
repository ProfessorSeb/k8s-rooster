---
# Destroy LXC containers on Proxmox (cleanup)
# Usage: ansible-playbook playbooks/destroy-containers.yml

- name: Destroy LXC containers
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proxmox_host: "{{ hostvars['pve']['ansible_host'] }}"
    proxmox_user: "root@pam"
    proxmox_node: "pro"
    container_vmids:
      - { name: "compliance-web", vmid: 200 }
      - { name: "compliance-app", vmid: 201 }
      - { name: "compliance-db",  vmid: 202 }

  tasks:
    - name: Stop LXC containers
      community.general.proxmox:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ item.vmid }}"
        state: stopped
        force: true
      loop: "{{ container_vmids }}"
      loop_control:
        label: "{{ item.name }} (VMID {{ item.vmid }})"
      ignore_errors: true

    - name: Remove LXC containers
      community.general.proxmox:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ item.vmid }}"
        state: absent
      loop: "{{ container_vmids }}"
      loop_control:
        label: "{{ item.name }} (VMID {{ item.vmid }})"
      ignore_errors: true

    - name: Clean up container IP file
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../inventory/group_vars/container_ips.yml"
        state: absent
      delegate_to: localhost
