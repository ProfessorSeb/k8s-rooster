---
# Provision LXC containers on Proxmox
# Usage: ansible-playbook playbooks/provision-containers.yml
- name: Create LXC containers on Proxmox
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    proxmox_host: "{{ hostvars['pve']['ansible_host'] }}"
    proxmox_user: "root@pam"
    proxmox_node: "pro"
    containers:
      - "{{ hostvars['compliance-web'] }}"
      - "{{ hostvars['compliance-app'] }}"
      - "{{ hostvars['compliance-db'] }}"

  tasks:
    - name: Create LXC containers
      community.general.proxmox:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ item.lxc_vmid }}"
        hostname: "{{ item.inventory_hostname }}"
        ostemplate: "{{ hostvars['pve']['proxmox_template'] | default('local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst') }}"
        storage: "{{ hostvars['pve']['proxmox_storage'] | default('local-lvm') }}"
        memory: "{{ item.lxc_memory }}"
        swap: "{{ item.lxc_swap }}"
        disk: "{{ item.lxc_disk }}"
        cores: "{{ item.lxc_cores }}"
        netif: '{"net0":"name=eth0,bridge={{ hostvars["pve"]["proxmox_bridge"] | default("vmbr0") }},ip=dhcp"}'
        onboot: true
        unprivileged: true
        features:
          - nesting=1
        description: "{{ item.lxc_description }}"
        state: present
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.inventory_hostname }} (VMID {{ item.lxc_vmid }})"

    - name: Start LXC containers
      community.general.proxmox:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ item.lxc_vmid }}"
        state: started
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.inventory_hostname }} (VMID {{ item.lxc_vmid }})"

    - name: Wait for containers to get DHCP addresses
      ansible.builtin.pause:
        seconds: 10
        prompt: "Waiting for DHCP lease assignment..."

    - name: Get container IPs from Proxmox
      ansible.builtin.shell: |
        pvesh get /nodes/{{ proxmox_node }}/lxc/{{ item.lxc_vmid }}/interfaces --output-format json | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for iface in data:
            if iface.get('name') == 'eth0':
                for addr in iface.get('inet', '').split():
                    ip = addr.split('/')[0]
                    if ip.startswith('172.16'):
                        print(ip)
                        sys.exit(0)
        print('NO_IP')
        "
      delegate_to: pve
      register: container_ips
      loop: "{{ containers }}"
      loop_control:
        label: "{{ item.inventory_hostname }}"

    - name: Display assigned IPs
      ansible.builtin.debug:
        msg: "{{ item.item.inventory_hostname }}: {{ item.stdout }}"
      loop: "{{ container_ips.results }}"
      loop_control:
        label: "{{ item.item.inventory_hostname }}"

    - name: Write IPs to inventory override file
      ansible.builtin.copy:
        content: |
          ---
          # Auto-generated by provision-containers.yml — {{ ansible_date_time.iso8601 | default('unknown') }}
          # Update these if containers get new DHCP leases
          compliance_web_ip: "{{ container_ips.results[0].stdout }}"
          compliance_app_ip: "{{ container_ips.results[1].stdout }}"
          compliance_db_ip: "{{ container_ips.results[2].stdout }}"
        dest: "{{ playbook_dir }}/../inventory/group_vars/container_ips.yml"
      delegate_to: localhost
