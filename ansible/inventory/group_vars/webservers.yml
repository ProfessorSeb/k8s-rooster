---
# Nginx reverse proxy configuration

nginx_worker_processes: 1
nginx_worker_connections: 256

# Upstream backend — resolved from container_ips.yml
nginx_upstream_host: "{{ compliance_app_ip }}"
nginx_upstream_port: 5000

# TLS (self-signed for demo)
nginx_ssl_enabled: false

# Access log
nginx_access_log: /var/log/nginx/compliance-portal.access.log
nginx_error_log: /var/log/nginx/compliance-portal.error.log
