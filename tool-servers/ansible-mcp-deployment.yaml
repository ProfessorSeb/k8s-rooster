apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-mcp-server
  namespace: kagent
  labels:
    app: ansible-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-mcp-server
  template:
    metadata:
      labels:
        app: ansible-mcp-server
    spec:
      containers:
      - name: ansible-mcp
        image: sebbycorp/ansible-mcp-server:latest
        ports:
        - containerPort: 8080
        env:
        - name: SEMAPHORE_URL
          value: "http://semaphore.kagent.svc.cluster.local:3000"
        - name: SEMAPHORE_TOKEN
          valueFrom:
            secretKeyRef:
              name: ansible-mcp-credentials
              key: SEMAPHORE_TOKEN
        - name: ANSIBLE_REPO
          value: "https://github.com/ProfessorSeb/k8s-rooster.git"
        - name: ANSIBLE_PATH
          value: "ansible"
        - name: TRANSPORT_HOST
          value: "0.0.0.0"
        - name: TRANSPORT_PORT
          value: "8080"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-mcp-server
  namespace: kagent
  labels:
    app: ansible-mcp-server
spec:
  selector:
    app: ansible-mcp-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
