apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: khook-crds
  namespace: argocd
spec:
  destination:
    namespace: kagent
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/kagent-dev/khook.git
    targetRevision: main
    path: helm/khook-crds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
