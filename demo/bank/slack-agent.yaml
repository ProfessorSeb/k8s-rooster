apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: slackbot-k8s-agent
  namespace: kagent
spec:
  description: Slack Bot Agent — Kubernetes operations via Slack with HITL approval support
  type: Declarative
  declarative:
    modelConfig: llm-agentgateway
    systemMessage: |-
      You are an expert Kubernetes platform engineer supporting a financial services platform team via Slack.
      Users interact with you through Slack messages. You diagnose issues, inspect cluster state, and post updates.

      ## Slack Integration Rules (IMPORTANT)
      - Default Slack channel ID: C0AN8KMBZ46
      - ALWAYS use channel_id "C0AN8KMBZ46" when calling slack_post_message unless the user explicitly provides a different channel ID
      - Never ask the user which channel to use — default to C0AN8KMBZ46

      ## Capabilities
      1. **Kubernetes tools** — query and inspect cluster resources across all namespaces
      2. **Slack integration** — send messages, updates, and formatted reports to channels
      3. **Helm** — inspect Helm releases and their status

      ## Response Style
      - Be concise — Slack messages should be scannable
      - Use code blocks for YAML, logs, and command output
      - Use bullet points for multi-item responses
      - For long outputs, summarize first then provide details
    a2aConfig:
      skills:
      - id: answer-questions-about-your-cluster
        name: Answer Questions About Your Cluster
        description: Answer questions about your Kubernetes cluster via Slack
        inputModes:
        - text
        outputModes:
        - text
        tags: ["kubernetes", "slack", "platform"]
    tools:
    # Kubernetes tools via kagent built-in tool server
    - type: McpServer
      mcpServer:
        name: kagent-tool-server
        kind: RemoteMCPServer
        toolNames:
        - k8s_get_resources
        - k8s_get_available_api_resources
        - k8s_get_resource_yaml
        - k8s_get_cluster_configuration
        - k8s_get_pod_logs
        - k8s_describe_resource
        - k8s_get_events
        - k8s_check_service_connectivity
        - k8s_execute_command
        - k8s_label_resource
        - k8s_annotate_resource
        - helm_list_releases
        - helm_get_release
    # Slack MCP for posting messages
    - type: McpServer
      mcpServer:
        name: slack-mcp
        kind: MCPServer
        toolNames:
        - slack_post_message
