# payment-service Service + VirtualService — starts HEALTHY
# chaos.sh will swap the destination to a non-existent host
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: finance-payments
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: payment-vs
  namespace: finance-payments
spec:
  hosts:
  - payment-service
  http:
  - route:
    - destination:
        host: payment-service
        port:
          number: 8080
